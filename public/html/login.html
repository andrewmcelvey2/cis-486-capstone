<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Reaction Challenge Pro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/">Reaction Challenge Pro</a>
      <a href="/html/login.html" class="btn btn-primary btn-sm">Login / Register</a>
    </div>
  </nav>

  <div class="container mt-5 d-flex justify-content-center">
    <div style="width: 360px;">

      <div id="alert-area"></div>

      <h2 class="text-center">Welcome back</h2>
      <p class="text-center text-muted mb-4">Log in to track your scores</p>

      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" id="username" class="form-control" placeholder="Enter your username">
      </div>

      <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter your password">
      </div>

      <button id="login-btn" class="btn btn-primary w-100 mb-4">Login</button>

      <div class="text-center border-top pt-3">
        <p class="text-muted">Don't have an account? <a href="/html/register.html">Register here</a></p>
      </div>
    </div>
  </div>

  <footer class="text-center text-muted py-3 mt-4">
    <small>Reaction Challenge Pro — CIS 486 Capstone</small>
  </footer>

  <script src="../js/auth.js"></script>
</body>
</html>
